show_text:
  fields:
    host:
      example: 192.168.178.50
    text:
      required: true
      example: Hallo Welt
    color:
      example: 1
    buzzer:
      example: 2

show_event:
  name: Event anzeigen
  description: Startet eine Event-Anzeige mit Vor-/Nachanimation, Text, Audio und Farbe.
  target:
    device:
      integration: wortuhr
  fields:
    text:
      name: Text
      description: Der Event-Text, der über die Uhr laufen soll (optional).
      required: false
      example: Geburtstag!
      selector:
        text:
    rgb_color:
      name: Farbe
      description: Wähle eine Farbe über den Farbkreis aus. Der Code sucht die passendste LED-Farbe heraus.
      required: false
      default: [255, 255, 255]
      selector:
        color_rgb: {}
    audio:
      name: Audio-Datei ID
      description: ID der abzuspielenden MP3-Datei (z. B. 701).
      example: 701
      selector:
        number:
          min: 0
          max: 999
          mode: box
    preani:
      name: Vor-Animation (Pre-Animation)
      description: Die Animation, die VOR dem Text abgespielt wird.
      required: false
      selector:
        text:
    postani:
      name: Nach-Animation (Post-Animation)
      description: Die Animation, die NACH dem Text abgespielt wird.
      required: false
      selector:
        text:

play_audio:
  fields:
    host:
    soundfile:
      required: true
      example: 819
    volume:
      example: 100

set_mode:
  fields:
    host:
    mode:
      required: true
      example: 2
    sound:
      example: true

reboot:
  fields:
    host:

wifi_reset:
  fields:
    host:

mp3_reset:
  fields:
    host:
