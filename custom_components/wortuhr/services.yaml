show_text:
  name: Text anzeigen
  description: Zeigt einen Text auf der Wortuhr an.
  fields:
    host:
      name: Host
      description: IP-Adresse oder Hostname der Wortuhr.
      example: 192.168.178.50
    text:
      name: Text
      description: Der anzuzeigende Text.
      required: true
      example: Hallo Welt
    color:
      name: Farbe
      description: Farb-Index der Wortuhr.
      example: 1
    buzzer:
      name: Summer
      description: Aktiviert oder deaktiviert den Summer.
      example: 2

show_event:
  name: Event anzeigen
  description: Startet eine Event-Anzeige mit Vor-/Nachanimation, Text, Audio und Farbe.
  fields:
    text:
      name: Text
      description: Der Event-Text, der über die Uhr laufen soll.
      required: false
      example: Geburtstag!
      selector:
        text:
    color:
      name: Farbe
      description: Farb-Index der Wortuhr (0-24).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 24
          mode: box
    audio:
      name: Audio-Datei ID
      description: ID der abzuspielenden MP3-Datei (z. B. 701).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 999
          mode: box
    preani:
      name: Vor-Animation (Pre-Animation)
      description: Animation vor dem Text.
      required: false
      selector:
        text:
    postani:
      name: Nach-Animation (Post-Animation)
      description: Animation nach dem Text.
      required: false
      selector:
        text:

play_audio:
  fields:
    host:
    soundfile:
      required: true
      example: 819
    volume:
      example: 100

set_mode:
  fields:
    host:
    mode:
      required: true
      example: 2
    sound:
      example: true

reboot:
  fields:
    host:

wifi_reset:
  fields:
    host:

mp3_reset:
  fields:
    host:

notify:
  name: Nachricht senden
  description: Sendet eine Nachricht an die Wortuhr über die Notify-Plattform.
  fields:
    message:
      name: Nachricht
      description: Der Text, der auf der Wortuhr angezeigt werden soll.
      required: true
      example: Hallo Welt
      selector:
        text:
    title:
      name: Titel
      description: Optionaler Titel, der vor der Nachricht angezeigt wird.
      required: false
      example: Hinweis
      selector:
        text:
    data:
      name: Daten
      description: Zusätzliche Optionen wie Farbe und Summer.
      required: false
      example:
        color: 5
        buzzer: 1
