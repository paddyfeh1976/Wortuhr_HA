show_text:
  fields:
    host:
      example: 192.168.178.50
    text:
      required: true
      example: Hallo Welt
    color:
      example: 1
    buzzer:
      example: 2

show_event:
  name: Event anzeigen
  description: Startet eine Event-Anzeige mit Vor-/Nachanimation, Text, Audio und Farbe.
  fields:
    text:
      name: Text
      description: Der Event-Text, der über die Uhr laufen soll.
      required: false
      example: Geburtstag!
      selector:
        text:
    color:
      name: Farbe
      description: Farb-Index der Wortuhr (0-24).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 24
          mode: box
    audio:
      name: Audio-Datei ID
      description: ID der abzuspielenden MP3-Datei (z. B. 701).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 999
          mode: box
    preani:
      name: Vor-Animation (Pre-Animation)
      description: Animation vor dem Text.
      required: false
      selector:
        text:
    postani:
      name: Nach-Animation (Post-Animation)
      description: Animation nach dem Text.
      required: false
      selector:
        text:

play_audio:
  fields:
    host:
    soundfile:
      required: true
      example: 819
    volume:
      example: 100

set_mode:
  fields:
    host:
    mode:
      required: true
      example: 2
    sound:
      example: true

reboot:
  fields:
    host:

wifi_reset:
  fields:
    host:

mp3_reset:
  fields:
    host:
